[build]
  publish = "."
  command = ""

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/places/search"
  to = "/.netlify/functions/places-search"
  status = 200

[[redirects]]
  from = "/api/quote"
  to = "/.netlify/functions/quote"
  status = 200
