<!DOCTYPE html>
<html lang="zh-TW" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
  <title>車旅所 Google 版 | 租賃車接送預約平台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    html, body { width: 100%; max-width: 100%; overflow-x: hidden; }
    .pac-container { z-index: 99999 !important; border-radius: 12px; overflow: hidden; border: 1px solid #334155; box-shadow: 0 18px 45px rgba(0,0,0,.35); }
  </style>
</head>
<body class="bg-slate-900 text-slate-100 antialiased">
  <header class="sticky top-0 z-50 bg-slate-950/90 backdrop-blur-md border-b border-slate-800">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 sm:h-20 flex items-center justify-between">
      <a href="./index.html" class="flex items-center gap-2">
        <span class="text-xl sm:text-2xl font-bold tracking-widest text-white">車旅所<span class="text-amber-500">.</span></span>
        <span class="hidden sm:inline-block px-2.5 py-0.5 text-xs font-semibold bg-blue-500/10 text-blue-300 border border-blue-500/20 rounded-full">Google Places 版</span>
      </a>
      <a href="./index.html" class="text-sm text-slate-300 hover:text-amber-400">回 OSM 版</a>
    </div>
  </header>

  <main>
    <section class="relative min-h-[85vh] flex items-center justify-center py-8 sm:py-12 px-4 sm:px-6 lg:px-8 bg-slate-950 overflow-hidden">
      <div class="absolute inset-0 opacity-10 bg-[radial-gradient(#d97706_1px,transparent_1px)] [background-size:16px_16px]"></div>
      <div class="relative max-w-5xl w-full flex flex-col items-center gap-6 sm:gap-8">
        <div class="text-center">
          <h1 class="text-3xl sm:text-4xl md:text-5xl font-extrabold tracking-tight text-white mb-2 sm:mb-4 px-2">
            租賃車接送試算 <span class="text-transparent bg-clip-text bg-gradient-to-r from-blue-300 to-amber-500">Google 版</span>
          </h1>
          <p class="text-sm sm:text-base text-slate-400 max-w-3xl mx-auto px-4 leading-relaxed">
            API key 不會寫進 GitHub。請在本頁輸入 key，系統只會存在你的瀏覽器 localStorage。
          </p>
        </div>

        <div id="keyPanel" class="w-full bg-slate-800/80 border border-blue-500/30 rounded-2xl p-5 sm:p-6 shadow-2xl">
          <label class="block text-sm sm:text-base font-bold text-slate-300 mb-2">Google Maps API Key</label>
          <div class="flex flex-col sm:flex-row gap-2">
            <input id="apiKeyInput" type="password" placeholder="通常是 AIza... 開頭" class="flex-1 bg-slate-950 border border-slate-700 rounded-lg px-3.5 py-3 text-base text-slate-100 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500/50" />
            <button id="saveKeyButton" type="button" class="px-5 py-3 bg-blue-500 hover:bg-blue-400 text-slate-950 font-black rounded-lg">載入 Google</button>
            <button id="clearKeyButton" type="button" class="px-5 py-3 bg-slate-700 hover:bg-slate-600 text-slate-100 font-bold rounded-lg">清除</button>
          </div>
          <p id="keyStatus" class="text-xs text-slate-400 mt-2">請先輸入 Google Maps Browser key。需要啟用 Maps JavaScript API、Places API、Distance Matrix API。</p>
        </div>

        <div class="w-full bg-slate-800/80 border border-slate-700/50 rounded-2xl shadow-2xl backdrop-blur-md overflow-visible">
          <div class="p-5 sm:p-8">
            <form id="bookingForm" class="space-y-5 sm:space-y-6">
              <div class="grid grid-cols-1 md:grid-cols-2 gap-5 sm:gap-6">
                <div>
                  <label class="block text-sm sm:text-base font-bold text-slate-300 mb-1.5 sm:mb-2">出發地址</label>
                  <input type="text" id="txtSource" placeholder="例：台北市內湖區麗山街63號、麗山國中" autocomplete="off" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3.5 py-3 text-base text-slate-100 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-amber-500/50 transition-all" />
                  <p id="sourceStatus" class="text-xs text-slate-500 mt-2">載入 Google 後，請從候選地址選擇，或直接按試算讓系統定位。</p>
                </div>
                <div>
                  <label class="block text-sm sm:text-base font-bold text-slate-300 mb-1.5 sm:mb-2">抵達機場</label>
                  <select id="airportDest" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3.5 py-3 text-base text-slate-100 focus:outline-none focus:ring-2 focus:ring-amber-500/50 transition-all"></select>
                </div>
              </div>

              <div class="grid grid-cols-1 md:grid-cols-12 gap-5 sm:gap-6">
                <div class="md:col-span-7">
                  <label class="block text-sm sm:text-base font-bold text-slate-300 mb-1.5 sm:mb-2">乘車日期與時間</label>
                  <div class="grid grid-cols-3 gap-2">
                    <input type="date" id="rideDate" required class="col-span-3 sm:col-span-1 bg-slate-900 border border-slate-700 rounded-lg px-3 py-3 text-base text-slate-100 focus:outline-none focus:ring-2 focus:ring-amber-500/50" />
                    <select id="rideHour" required class="bg-slate-900 border border-slate-700 rounded-lg px-3 py-3 text-base text-slate-100 focus:outline-none focus:ring-2 focus:ring-amber-500/50"></select>
                    <select id="rideMinute" required class="bg-slate-900 border border-slate-700 rounded-lg px-3 py-3 text-base text-slate-100 focus:outline-none focus:ring-2 focus:ring-amber-500/50"></select>
                  </div>
                </div>
                <div class="md:col-span-5">
                  <label class="block text-sm sm:text-base font-bold text-slate-300 mb-1.5 sm:mb-2">預定車型</label>
                  <select id="vehicleType" required class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3.5 py-3 text-base text-slate-100 focus:outline-none focus:ring-2 focus:ring-amber-500/50">
                    <option value="comfort_4">舒適四人座</option>
                    <option value="luxury_import">尊榮進口車 +500</option>
                    <option value="business_7">七人座商旅 +300</option>
                    <option value="premium_7">七人座尊爵 +2000</option>
                  </select>
                </div>
              </div>

              <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                <label class="flex items-center gap-3 bg-slate-900/70 border border-slate-700 rounded-lg px-4 py-3 text-sm text-slate-300">
                  <input type="checkbox" id="addonSign" class="accent-amber-500" />
                  <span>舉牌服務 +200</span>
                </label>
                <label class="flex items-center gap-3 bg-slate-900/70 border border-slate-700 rounded-lg px-4 py-3 text-sm text-slate-300">
                  <input type="checkbox" id="addonSeat" class="accent-amber-500" />
                  <span>兒童安全座椅 +300</span>
                </label>
              </div>

              <button id="quoteButton" type="submit" class="w-full py-4 bg-amber-500 hover:bg-amber-400 text-slate-950 font-black text-lg rounded-xl shadow-lg shadow-amber-900/20 transition-all flex items-center justify-center gap-2">
                <i data-lucide="calculator" class="w-5 h-5"></i>
                <span>Google 試算車資</span>
              </button>
            </form>
          </div>
        </div>
      </div>
    </section>
  </main>

  <div id="quoteModal" class="hidden fixed inset-0 z-[100] items-center justify-center p-4 bg-slate-950/80 backdrop-blur-sm">
    <div class="w-full max-w-md bg-slate-900 border border-slate-700 rounded-2xl shadow-2xl overflow-hidden">
      <div class="p-5 sm:p-6 space-y-5">
        <div class="text-center relative">
          <button id="closeModal" type="button" class="absolute right-0 top-0 text-slate-500 hover:text-slate-200"><i data-lucide="x" class="w-5 h-5"></i></button>
          <h3 class="text-xl sm:text-2xl font-extrabold text-white">Google 試算結果</h3>
        </div>
        <div class="bg-slate-950/60 border border-slate-800 p-4 rounded-xl space-y-2.5 text-sm">
          <p><span class="text-slate-400">起點：</span><span id="resultSource" class="text-white font-semibold"></span></p>
          <p><span class="text-slate-400">目的地：</span><span id="resultDest" class="text-white font-semibold"></span></p>
          <p><span class="text-slate-400">距離：</span><span id="resultDistance" class="text-amber-400 font-bold"></span></p>
          <p><span class="text-slate-400">時間：</span><span id="resultDuration" class="text-slate-200"></span></p>
          <p><span class="text-slate-400">計價方式：</span><span id="resultMethod" class="text-slate-200"></span></p>
        </div>
        <div class="bg-amber-500/5 border border-amber-500/20 py-4 px-6 rounded-xl text-center">
          <p class="text-xs text-amber-500/80 uppercase font-semibold tracking-wider">試算總費用</p>
          <p id="resultPrice" class="text-4xl font-black text-amber-400 mt-1">NT$ --</p>
        </div>
        <button id="backButton" type="button" class="w-full py-3 border border-slate-700 text-slate-300 font-semibold rounded-lg hover:bg-slate-800 transition-all text-sm">返回修改</button>
      </div>
    </div>
  </div>

  <script>
    const airports = [
      { code: 'TPE', text: '台灣桃園國際機場 (TPE)', lat: 25.0797, lng: 121.2342 },
      { code: 'TSA', text: '台北松山機場 (TSA)', lat: 25.0697, lng: 121.5518 },
      { code: 'RMQ', text: '台中清泉崗機場 (RMQ)', lat: 24.2636, lng: 120.6206 },
      { code: 'KHH', text: '高雄小港國際機場 (KHH)', lat: 22.5768, lng: 120.3500 }
    ];

    const airportPricing = {
      '台北市': { TPE: 1100, TSA: 850 },
      '臺北市': { TPE: 1100, TSA: 850 },
      '文山區': { TPE: 1300, TSA: 900 },
      '汐止區': { TPE: 1400, TSA: 1000 },
      '新北市': { TPE: 1300, TSA: 1000 },
      '桃園市': { TPE: 799 },
      '新竹市': { TPE: 1800 },
      '新竹縣': { TPE: 1900 }
    };

    const $ = (id) => document.getElementById(id);
    let selectedSourcePlace = null;
    let autocomplete = null;
    let geocoder = null;
    let distanceService = null;
    let mapsReady = false;

    function initSelects() {
      for (const airport of airports) $('airportDest').appendChild(new Option(airport.text, airport.code));
      for (let i = 0; i < 24; i++) $('rideHour').appendChild(new Option(String(i).padStart(2, '0') + ' 時', String(i).padStart(2, '0')));
      for (const m of ['00', '15', '30', '45']) $('rideMinute').appendChild(new Option(m + ' 分', m));
      const today = new Date().toISOString().slice(0, 10);
      $('rideDate').min = today;
      $('rideDate').value = today;
    }

    function setKeyStatus(message, className = 'text-xs text-slate-400 mt-2') {
      $('keyStatus').innerText = message;
      $('keyStatus').className = className;
    }

    function setSourceStatus(message, className = 'text-xs text-slate-500 mt-2') {
      $('sourceStatus').innerText = message;
      $('sourceStatus').className = className;
    }

    function getAirportByCode(code) {
      return airports.find((a) => a.code === code);
    }

    function loadGoogleMaps(key) {
      if (!key) {
        setKeyStatus('請輸入 Google Maps API key。', 'text-xs text-red-400 mt-2');
        return;
      }
      if (!key.startsWith('AIza')) {
        setKeyStatus('這串不像 Google Maps Browser key。Google key 通常是 AIza... 開頭。仍可嘗試載入。', 'text-xs text-amber-400 mt-2');
      } else {
        setKeyStatus('正在載入 Google Maps...', 'text-xs text-slate-400 mt-2');
      }
      localStorage.setItem('google-maps-browser-key', key);
      const oldScript = document.getElementById('googleMapsScript');
      if (oldScript) oldScript.remove();
      delete window.google;
      mapsReady = false;
      const script = document.createElement('script');
      script.id = 'googleMapsScript';
      script.async = true;
      script.defer = true;
      script.src = `https://maps.googleapis.com/maps/api/js?key=${encodeURIComponent(key)}&libraries=places&callback=initGoogleMaps`;
      script.onerror = handleGoogleMapsError;
      document.head.appendChild(script);
    }

    function initGoogleMaps() {
      mapsReady = true;
      geocoder = new google.maps.Geocoder();
      distanceService = new google.maps.DistanceMatrixService();
      autocomplete = new google.maps.places.Autocomplete($('txtSource'), {
        componentRestrictions: { country: 'tw' },
        fields: ['place_id', 'name', 'formatted_address', 'geometry', 'address_components'],
        types: ['geocode', 'establishment']
      });
      autocomplete.addListener('place_changed', () => {
        const place = autocomplete.getPlace();
        if (!place || !place.geometry || !place.geometry.location) {
          selectedSourcePlace = null;
          setSourceStatus('無法取得此地點座標，請改選其他候選地址。', 'text-xs text-red-400 mt-2');
          return;
        }
        selectedSourcePlace = normalizeGooglePlace(place);
        $('txtSource').value = selectedSourcePlace.label;
        setSourceStatus('已選擇 Google 候選地址。若修改文字，系統會重新定位。', 'text-xs text-emerald-400 mt-2');
      });
      setKeyStatus('Google Maps 已載入，可以測試地址。', 'text-xs text-emerald-400 mt-2');
    }

    function handleGoogleMapsError() {
      mapsReady = false;
      setKeyStatus('Google Maps 載入失敗。可能是 key 無效、API 未啟用、billing 未啟用，或 referrer 限制不符。', 'text-xs text-red-400 mt-2');
    }

    function normalizeGooglePlace(place) {
      return {
        placeId: place.place_id || null,
        label: place.formatted_address || place.name || $('txtSource').value.trim(),
        lat: place.geometry.location.lat(),
        lng: place.geometry.location.lng()
      };
    }

    function geocodeTypedSource() {
      const address = $('txtSource').value.trim();
      if (!address) return Promise.reject(new Error('請輸入出發地址。'));
      if (!mapsReady || !geocoder) return Promise.reject(new Error('Google Maps 尚未載入，請先輸入有效 API key。'));
      setSourceStatus('正在用 Google 定位輸入地址...', 'text-xs text-slate-400 mt-2');
      return new Promise((resolve, reject) => {
        geocoder.geocode({ address, componentRestrictions: { country: 'TW' } }, (results, status) => {
          if (status !== 'OK' || !results || !results[0]) {
            reject(new Error('Google 無法定位此地址，請改選候選地址或輸入更完整地址。'));
            return;
          }
          selectedSourcePlace = normalizeGooglePlace(results[0]);
          $('txtSource').value = selectedSourcePlace.label;
          setSourceStatus('已用 Google 自動定位輸入地址。若位置不對，請改選候選地址。', 'text-xs text-emerald-400 mt-2');
          resolve(selectedSourcePlace);
        });
      });
    }

    async function getSourcePlace() {
      if (selectedSourcePlace) return selectedSourcePlace;
      return await geocodeTypedSource();
    }

    function getDistanceByGoogle(source, destAirport) {
      if (!mapsReady || !distanceService) return Promise.reject(new Error('Google Maps 尚未載入，請先輸入有效 API key。'));
      return new Promise((resolve, reject) => {
        distanceService.getDistanceMatrix({
          origins: [{ lat: source.lat, lng: source.lng }],
          destinations: [{ lat: destAirport.lat, lng: destAirport.lng }],
          travelMode: google.maps.TravelMode.DRIVING,
          unitSystem: google.maps.UnitSystem.METRIC,
          region: 'TW'
        }, (response, status) => {
          if (status !== 'OK') {
            reject(new Error('Google 距離試算失敗：' + status));
            return;
          }
          const element = response.rows?.[0]?.elements?.[0];
          if (!element || element.status !== 'OK') {
            reject(new Error('Google 無法計算此路線距離。'));
            return;
          }
          resolve({
            distanceKm: element.distance.value / 1000,
            distanceText: element.distance.text,
            durationText: element.duration.text,
            method: 'Google Distance Matrix driving route'
          });
        });
      });
    }

    function detectZone(text) {
      if (text.includes('文山')) return '文山區';
      if (text.includes('汐止')) return '汐止區';
      if (text.includes('台北')) return '台北市';
      if (text.includes('臺北')) return '臺北市';
      if (text.includes('新北')) return '新北市';
      if (text.includes('桃園')) return '桃園市';
      if (text.includes('新竹市')) return '新竹市';
      if (text.includes('新竹縣')) return '新竹縣';
      return null;
    }

    function calculatePrice(sourceLabel, airportCode, distanceKm) {
      const vehicleSurcharge = {
        comfort_4: 0,
        luxury_import: 500,
        business_7: 300,
        premium_7: 2000
      }[$('vehicleType').value] ?? 0;
      const addonPrice = ($('addonSign').checked ? 200 : 0) + ($('addonSeat').checked ? 300 : 0);
      let basePrice = Math.max(Math.round(distanceKm * 20), 799);
      let pricingMethod = '距離計價：max(round(distance_km × 20), 799)';
      const zone = detectZone(sourceLabel);
      if (zone && airportPricing[zone] && airportPricing[zone][airportCode]) {
        basePrice = airportPricing[zone][airportCode];
        pricingMethod = `機場固定價目表：${zone} ⇄ ${airportCode}`;
      }
      return { totalPrice: basePrice + vehicleSurcharge + addonPrice, pricingMethod };
    }

    async function handleQuote(event) {
      event.preventDefault();
      const button = $('quoteButton');
      const originalText = button.innerHTML;
      button.disabled = true;
      button.innerHTML = '<span class="animate-spin rounded-full h-5 w-5 border-2 border-slate-950 border-t-transparent"></span><span>Google 定位與試算中...</span>';
      try {
        const source = await getSourcePlace();
        const destAirport = getAirportByCode($('airportDest').value);
        const route = await getDistanceByGoogle(source, destAirport);
        const quote = calculatePrice(source.label, destAirport.code, route.distanceKm);
        $('resultSource').innerText = source.label;
        $('resultDest').innerText = destAirport.text;
        $('resultDistance').innerText = route.distanceText || `${route.distanceKm.toFixed(1)} 公里`;
        $('resultDuration').innerText = route.durationText;
        $('resultMethod').innerText = quote.pricingMethod + ' / ' + route.method;
        $('resultPrice').innerText = `NT$ ${quote.totalPrice.toLocaleString()}`;
        $('quoteModal').classList.remove('hidden');
        $('quoteModal').classList.add('flex');
      } catch (error) {
        alert(error.message || 'Google 試算失敗，請確認地址或 API key。');
      } finally {
        button.disabled = false;
        button.innerHTML = originalText;
        lucide.createIcons();
      }
    }

    function closeQuoteModal() {
      $('quoteModal').classList.add('hidden');
      $('quoteModal').classList.remove('flex');
    }

    document.addEventListener('DOMContentLoaded', () => {
      initSelects();
      $('bookingForm').addEventListener('submit', handleQuote);
      $('closeModal').addEventListener('click', closeQuoteModal);
      $('backButton').addEventListener('click', closeQuoteModal);
      $('saveKeyButton').addEventListener('click', () => loadGoogleMaps($('apiKeyInput').value.trim()));
      $('clearKeyButton').addEventListener('click', () => {
        localStorage.removeItem('google-maps-browser-key');
        $('apiKeyInput').value = '';
        setKeyStatus('已清除瀏覽器內的 key。', 'text-xs text-slate-400 mt-2');
      });
      $('txtSource').addEventListener('input', () => {
        selectedSourcePlace = null;
        setSourceStatus('地址已修改，請選擇 Google 候選地址，或直接按試算讓系統定位。', 'text-xs text-amber-400 mt-2');
      });
      const storedKey = localStorage.getItem('google-maps-browser-key');
      if (storedKey) {
        $('apiKeyInput').value = storedKey;
        loadGoogleMaps(storedKey);
      }
      lucide.createIcons();
    });

    window.initGoogleMaps = initGoogleMaps;
    window.gm_authFailure = handleGoogleMapsError;
  </script>
</body>
</html>
