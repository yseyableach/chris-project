<!DOCTYPE html>
<html lang="zh-TW" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
  <title>車旅所 Google 版 | 租賃車接送預約平台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    html, body { width: 100%; max-width: 100%; overflow-x: hidden; }
    .pac-container { z-index: 99999 !important; border-radius: 12px; overflow: hidden; border: 1px solid #334155; box-shadow: 0 18px 45px rgba(0,0,0,.35); }
  </style>
</head>
<body class="bg-slate-900 text-slate-100 antialiased">
  <header class="sticky top-0 z-50 bg-slate-950/90 backdrop-blur-md border-b border-slate-800">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 sm:h-20 flex items-center justify-between">
      <a href="./index.html" class="flex items-center gap-2">
        <span class="text-xl sm:text-2xl font-bold tracking-widest text-white">車旅所<span class="text-amber-500">.</span></span>
        <span class="hidden sm:inline-block px-2.5 py-0.5 text-xs font-semibold bg-blue-500/10 text-blue-300 border border-blue-500/20 rounded-full">Google Places 版</span>
      </a>
      <a href="./index.html" class="text-sm text-slate-300 hover:text-amber-400">回 OSM 版</a>
    </div>
  </header>

  <main>
    <section class="relative min-h-[85vh] flex items-center justify-center py-8 sm:py-12 px-4 sm:px-6 lg:px-8 bg-slate-950 overflow-hidden">
      <div class="absolute inset-0 opacity-10 bg-[radial-gradient(#d97706_1px,transparent_1px)] [background-size:16px_16px]"></div>
      <div class="relative max-w-5xl w-full flex flex-col items-center gap-6 sm:gap-8">
        <div class="text-center">
          <h1 class="text-3xl sm:text-4xl md:text-5xl font-extrabold tracking-tight text-white mb-2 sm:mb-4 px-2">
            租賃車接送試算 <span class="text-transparent bg-clip-text bg-gradient-to-r from-blue-300 to-amber-500">Google 版</span>
          </h1>
          <p class="text-sm sm:text-base text-slate-400 max-w-3xl mx-auto px-4 leading-relaxed">
            輸入出發地並選擇候選結果，系統會用後端路線服務試算車資。
          </p>
        </div>

        <div id="serverPanel" class="w-full bg-slate-800/80 border border-blue-500/30 rounded-2xl p-5 sm:p-6 shadow-2xl">
          <label class="block text-sm sm:text-base font-bold text-slate-300 mb-2">後端連線</label>
          <p id="serverStatus" class="text-sm text-emerald-300">Netlify Functions 已接管路線與報價。</p>
        </div>

        <div class="w-full bg-slate-800/80 border border-slate-700/50 rounded-2xl shadow-2xl backdrop-blur-md overflow-visible">
          <div class="p-5 sm:p-8">
            <form id="bookingForm" class="space-y-5 sm:space-y-6">
              <div class="grid grid-cols-1 md:grid-cols-2 gap-5 sm:gap-6">
                <div>
                  <label class="block text-sm sm:text-base font-bold text-slate-300 mb-1.5 sm:mb-2">出發地址</label>
                  <div class="flex flex-col sm:flex-row gap-2">
                    <input type="text" id="txtSource" placeholder="例：台北市內湖區麗山街63號、麗山國中" autocomplete="off" class="flex-1 min-w-0 bg-slate-900 border border-slate-700 rounded-lg px-3.5 py-3 text-base text-slate-100 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-amber-500/50 transition-all" />
                    <button id="searchSourceButton" type="button" class="px-5 py-3 bg-slate-700 hover:bg-slate-600 border border-slate-600 rounded-lg text-sm font-bold text-slate-100 transition-all">搜尋候選</button>
                  </div>
                  <p id="sourceStatus" class="text-xs text-slate-500 mt-2">請先搜尋並選擇候選地點。</p>
                  <div id="sourceResults" class="hidden mt-3 bg-slate-950 border border-slate-700 rounded-xl overflow-hidden divide-y divide-slate-800 max-h-64 overflow-y-auto"></div>
                </div>
                <div>
                  <label class="block text-sm sm:text-base font-bold text-slate-300 mb-1.5 sm:mb-2">抵達機場</label>
                  <select id="airportDest" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3.5 py-3 text-base text-slate-100 focus:outline-none focus:ring-2 focus:ring-amber-500/50 transition-all"></select>
                </div>
              </div>

              <div class="grid grid-cols-1 md:grid-cols-12 gap-5 sm:gap-6">
                <div class="md:col-span-7">
                  <label class="block text-sm sm:text-base font-bold text-slate-300 mb-1.5 sm:mb-2">乘車日期與時間</label>
                  <div class="grid grid-cols-3 gap-2">
                    <input type="date" id="rideDate" required class="col-span-3 sm:col-span-1 bg-slate-900 border border-slate-700 rounded-lg px-3 py-3 text-base text-slate-100 focus:outline-none focus:ring-2 focus:ring-amber-500/50" />
                    <select id="rideHour" required class="bg-slate-900 border border-slate-700 rounded-lg px-3 py-3 text-base text-slate-100 focus:outline-none focus:ring-2 focus:ring-amber-500/50"></select>
                    <select id="rideMinute" required class="bg-slate-900 border border-slate-700 rounded-lg px-3 py-3 text-base text-slate-100 focus:outline-none focus:ring-2 focus:ring-amber-500/50"></select>
                  </div>
                </div>
                <div class="md:col-span-5">
                  <label class="block text-sm sm:text-base font-bold text-slate-300 mb-1.5 sm:mb-2">預定車型</label>
                  <select id="vehicleType" required class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3.5 py-3 text-base text-slate-100 focus:outline-none focus:ring-2 focus:ring-amber-500/50">
                    <option value="comfort_4">舒適四人座</option>
                    <option value="luxury_import">尊榮進口車 +500</option>
                    <option value="business_7">七人座商旅 +300</option>
                    <option value="premium_7">七人座尊爵 +2000</option>
                  </select>
                </div>
              </div>

              <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                <label class="flex items-center gap-3 bg-slate-900/70 border border-slate-700 rounded-lg px-4 py-3 text-sm text-slate-300">
                  <input type="checkbox" id="addonSign" class="accent-amber-500" />
                  <span>舉牌服務 +200</span>
                </label>
                <label class="flex items-center gap-3 bg-slate-900/70 border border-slate-700 rounded-lg px-4 py-3 text-sm text-slate-300">
                  <input type="checkbox" id="addonSeat" class="accent-amber-500" />
                  <span>兒童安全座椅 +300</span>
                </label>
              </div>

              <button id="quoteButton" type="submit" class="w-full py-4 bg-amber-500 hover:bg-amber-400 text-slate-950 font-black text-lg rounded-xl shadow-lg shadow-amber-900/20 transition-all flex items-center justify-center gap-2">
                <i data-lucide="calculator" class="w-5 h-5"></i>
                <span>Google 試算車資</span>
              </button>
            </form>
          </div>
        </div>
      </div>
    </section>
  </main>

  <div id="quoteModal" class="hidden fixed inset-0 z-[100] items-center justify-center p-4 bg-slate-950/80 backdrop-blur-sm">
    <div class="w-full max-w-md bg-slate-900 border border-slate-700 rounded-2xl shadow-2xl overflow-hidden">
      <div class="p-5 sm:p-6 space-y-5">
        <div class="text-center relative">
          <button id="closeModal" type="button" class="absolute right-0 top-0 text-slate-500 hover:text-slate-200"><i data-lucide="x" class="w-5 h-5"></i></button>
          <h3 class="text-xl sm:text-2xl font-extrabold text-white">Google 試算結果</h3>
        </div>
        <div class="bg-slate-950/60 border border-slate-800 p-4 rounded-xl space-y-2.5 text-sm">
          <p><span class="text-slate-400">起點：</span><span id="resultSource" class="text-white font-semibold"></span></p>
          <p><span class="text-slate-400">目的地：</span><span id="resultDest" class="text-white font-semibold"></span></p>
          <p><span class="text-slate-400">距離：</span><span id="resultDistance" class="text-amber-400 font-bold"></span></p>
          <p><span class="text-slate-400">時間：</span><span id="resultDuration" class="text-slate-200"></span></p>
          <p><span class="text-slate-400">計價方式：</span><span id="resultMethod" class="text-slate-200"></span></p>
        </div>
        <div class="bg-amber-500/5 border border-amber-500/20 py-4 px-6 rounded-xl text-center">
          <p class="text-xs text-amber-500/80 uppercase font-semibold tracking-wider">試算總費用</p>
          <p id="resultPrice" class="text-4xl font-black text-amber-400 mt-1">NT$ --</p>
        </div>
        <button id="backButton" type="button" class="w-full py-3 border border-slate-700 text-slate-300 font-semibold rounded-lg hover:bg-slate-800 transition-all text-sm">返回修改</button>
      </div>
    </div>
  </div>

  <script>
    const airports = [
      { code: 'TPE', text: '台灣桃園國際機場 (TPE)', lat: 25.0797, lng: 121.2342 },
      { code: 'TSA', text: '台北松山機場 (TSA)', lat: 25.0697, lng: 121.5518 },
      { code: 'RMQ', text: '台中清泉崗機場 (RMQ)', lat: 24.2636, lng: 120.6206 },
      { code: 'KHH', text: '高雄小港國際機場 (KHH)', lat: 22.5768, lng: 120.3500 }
    ];

    const $ = (id) => document.getElementById(id);
    let selectedSourcePlace = null;
    let sourceComposing = false;

    function initSelects() {
      for (const airport of airports) $('airportDest').appendChild(new Option(airport.text, airport.code));
      for (let i = 0; i < 24; i++) $('rideHour').appendChild(new Option(String(i).padStart(2, '0') + ' 時', String(i).padStart(2, '0')));
      for (const m of ['00', '15', '30', '45']) $('rideMinute').appendChild(new Option(m + ' 分', m));
      const today = new Date().toISOString().slice(0, 10);
      $('rideDate').min = today;
      $('rideDate').value = today;
    }

    function setServerStatus(message, className = 'text-sm text-emerald-300') {
      $('serverStatus').innerText = message;
      $('serverStatus').className = className;
    }

    function setSourceStatus(message, className = 'text-xs text-slate-500 mt-2') {
      $('sourceStatus').innerText = message;
      $('sourceStatus').className = className;
    }

    function setQuoteEnabled(enabled) {
      const button = $('quoteButton');
      button.disabled = !enabled;
      button.classList.toggle('opacity-60', !enabled);
      button.classList.toggle('cursor-not-allowed', !enabled);
    }

    async function apiPost(path, payload) {
      const response = await fetch(path, {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify(payload),
      });

      const data = await response.json().catch(() => ({}));
      if (!response.ok) {
        throw new Error(data.error || `API request failed: ${response.status}`);
      }
      return data;
    }

    function renderCandidates(candidates) {
      const results = $('sourceResults');
      results.innerHTML = '';

      if (!candidates.length) {
        results.classList.add('hidden');
        setSourceStatus('找不到候選地點，請輸入更完整地址。', 'text-xs text-red-400 mt-2');
        return;
      }

      for (const candidate of candidates) {
        const button = document.createElement('button');
        button.type = 'button';
        button.className = 'w-full text-left px-4 py-3 hover:bg-slate-800 transition-colors';

        const name = document.createElement('p');
        name.className = 'text-sm font-bold text-slate-100';
        name.textContent = candidate.name || candidate.address;

        const address = document.createElement('p');
        address.className = 'text-xs text-slate-400 mt-1';
        address.textContent = candidate.address;

        button.append(name, address);
        button.addEventListener('click', () => selectSourceCandidate(candidate));
        results.appendChild(button);
      }

      results.classList.remove('hidden');
      setSourceStatus('請從候選地點中選擇一筆。', 'text-xs text-amber-400 mt-2');
    }

    function selectSourceCandidate(candidate) {
      selectedSourcePlace = candidate;
      $('txtSource').value = candidate.address || candidate.name;
      $('sourceResults').classList.add('hidden');
      $('sourceResults').innerHTML = '';
      setSourceStatus('已選擇候選地點，可以試算。', 'text-xs text-emerald-400 mt-2');
      setQuoteEnabled(true);
    }

    async function searchSource() {
      const query = $('txtSource').value.trim();
      if (query.length < 2) {
        setSourceStatus('請輸入至少 2 個字的地點或地址。', 'text-xs text-red-400 mt-2');
        return;
      }

      selectedSourcePlace = null;
      setQuoteEnabled(false);
      const button = $('searchSourceButton');
      const originalText = button.innerText;
      button.disabled = true;
      button.innerText = '搜尋中...';
      setSourceStatus('正在搜尋候選地點...', 'text-xs text-slate-400 mt-2');

      try {
        const data = await apiPost('/api/places/search', { query });
        renderCandidates(data.candidates || []);
        setServerStatus('後端搜尋完成。', 'text-sm text-emerald-300');
      } catch (error) {
        $('sourceResults').classList.add('hidden');
        setSourceStatus(error.message || '搜尋候選地點失敗。', 'text-xs text-red-400 mt-2');
        setServerStatus('後端搜尋失敗。', 'text-sm text-red-300');
      } finally {
        button.disabled = false;
        button.innerText = originalText;
      }
    }

    function formatDuration(duration) {
      const seconds = Number(String(duration || '').replace('s', ''));
      if (!Number.isFinite(seconds) || seconds <= 0) return '需人工確認';
      const minutes = Math.round(seconds / 60);
      if (minutes < 60) return `${minutes} 分鐘`;
      const hours = Math.floor(minutes / 60);
      const rest = minutes % 60;
      return rest ? `${hours} 小時 ${rest} 分鐘` : `${hours} 小時`;
    }

    async function handleQuote(event) {
      event.preventDefault();
      if (!selectedSourcePlace) {
        setSourceStatus('請先搜尋並選擇候選地點。', 'text-xs text-red-400 mt-2');
        return;
      }

      const button = $('quoteButton');
      const originalText = button.innerHTML;
      button.disabled = true;
      button.innerHTML = '<span class="animate-spin rounded-full h-5 w-5 border-2 border-slate-950 border-t-transparent"></span><span>後端試算中...</span>';

      try {
        const quote = await apiPost('/api/quote', {
          origin: selectedSourcePlace,
          destinationAirportCode: $('airportDest').value,
          vehicleType: $('vehicleType').value,
          addons: {
            sign: $('addonSign').checked,
            childSeat: $('addonSeat').checked
          }
        });

        $('resultSource').innerText = quote.origin?.address || quote.origin?.name || selectedSourcePlace.address;
        $('resultDest').innerText = quote.destination?.text || $('airportDest').selectedOptions[0].text;
        $('resultDistance').innerText = `${Number(quote.distanceKm).toFixed(1)} 公里`;
        $('resultDuration').innerText = formatDuration(quote.duration);
        $('resultMethod').innerText = `${quote.pricingMethod} / ${quote.routeMethod}`;
        $('resultPrice').innerText = `NT$ ${Number(quote.totalPrice).toLocaleString()}`;
        $('quoteModal').classList.remove('hidden');
        $('quoteModal').classList.add('flex');
        setServerStatus(`報價 ${quote.quoteId} 已建立。`, 'text-sm text-emerald-300');
      } catch (error) {
        setSourceStatus(error.message || '後端試算失敗，需人工確認。', 'text-xs text-red-400 mt-2');
        setServerStatus('後端試算失敗。', 'text-sm text-red-300');
      } finally {
        button.disabled = false;
        button.innerHTML = originalText;
        lucide.createIcons();
      }
    }

    function closeQuoteModal() {
      $('quoteModal').classList.add('hidden');
      $('quoteModal').classList.remove('flex');
    }

    document.addEventListener('DOMContentLoaded', () => {
      initSelects();
      setQuoteEnabled(false);
      $('bookingForm').addEventListener('submit', handleQuote);
      $('closeModal').addEventListener('click', closeQuoteModal);
      $('backButton').addEventListener('click', closeQuoteModal);
      $('searchSourceButton').addEventListener('click', searchSource);
      $('txtSource').addEventListener('compositionstart', () => {
        sourceComposing = true;
      });
      $('txtSource').addEventListener('compositionend', () => {
        sourceComposing = false;
        selectedSourcePlace = null;
        setQuoteEnabled(false);
        setSourceStatus('地址已修改，請重新搜尋候選地點。', 'text-xs text-amber-400 mt-2');
      });
      $('txtSource').addEventListener('input', () => {
        if (sourceComposing) return;
        selectedSourcePlace = null;
        setQuoteEnabled(false);
        $('sourceResults').classList.add('hidden');
        setSourceStatus('地址已修改，請重新搜尋候選地點。', 'text-xs text-amber-400 mt-2');
      });
      $('txtSource').addEventListener('keydown', (event) => {
        if (event.key === 'Enter' && !sourceComposing) {
          event.preventDefault();
          searchSource();
        }
      });
      lucide.createIcons();
    });
  </script>
</body>
</html>
